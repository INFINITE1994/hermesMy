[project]
name = "systeminfo"
version = "1.0.0"
description = "系统信息查看器 - System Information Viewer"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PyQt6>=6.4.0",
    "psutil>=5.9.0",
    "GPUtil>=1.4.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools]
packages = ["."]
