[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "translator"
version = "1.0.0"
description = "专业桌面翻译工具 - 支持多语言翻译、词典查询、批量翻译等功能"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Translator Team"}
]

dependencies = [
    "PyQt6>=6.5.0",
    "requests>=2.28.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pyinstaller>=6.0.0",
]

[project.scripts]
translator = "main:main"

[tool.setuptools.packages.find]
where = ["."]
