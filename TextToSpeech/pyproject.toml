[project]
name = "TextToSpeech"
version = "1.0.0"
description = "专业文字转语音桌面工具 - 支持多语音、批量转换、音频保存"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Hermes Agent"}
]
dependencies = [
    "PyQt6>=6.5.0",
    "pyttsx3>=2.90",
    "pynput>=1.7.6",
    "pyperclip>=1.8.2",
]

[project.optional-dependencies]
dev = [
    "pyinstaller>=6.0",
]

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"
